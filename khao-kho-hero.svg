<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Khao Kho mountain and mist view</title>
  <desc id="desc">A scenic mountain sunrise with misty valleys inspired by Khao Kho, Phetchabun.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#b9d5dc"/>
      <stop offset=".42" stop-color="#f4d9aa"/>
      <stop offset="1" stop-color="#edf2e8"/>
    </linearGradient>
    <linearGradient id="ridge1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#214236"/>
      <stop offset="1" stop-color="#4f745f"/>
    </linearGradient>
    <linearGradient id="ridge2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#315a4a"/>
      <stop offset="1" stop-color="#7d926e"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6f8f61"/>
      <stop offset=".58" stop-color="#b28a4a"/>
      <stop offset="1" stop-color="#4c6f52"/>
    </linearGradient>
    <radialGradient id="sun" cx=".56" cy=".27" r=".2">
      <stop offset="0" stop-color="#fff8d5"/>
      <stop offset=".48" stop-color="#f4c56d"/>
      <stop offset="1" stop-color="#f4c56d" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1800" height="1050" fill="url(#sky)"/>
  <circle cx="1040" cy="250" r="210" fill="url(#sun)"/>
  <path d="M0 520 C180 425 275 430 430 500 C595 575 760 350 945 440 C1110 520 1195 390 1365 440 C1535 490 1625 410 1800 475 L1800 1050 L0 1050 Z" fill="#b5c8bf" opacity=".54"/>
