  <path d="M0 690 C205 570 390 600 545 682 C715 770 850 535 1040 635 C1180 710 1345 565 1500 640 C1625 700 1710 650 1800 690 L1800 1050 L0 1050 Z" fill="url(#ridge1)"/>
  <g opacity=".78" filter="url(#soft)">
    <path d="M-120 620 C130 560 300 610 515 585 C785 555 890 630 1110 590 C1350 548 1515 600 1910 555 L1910 705 C1540 770 1360 705 1125 738 C895 770 745 695 510 735 C270 775 120 720 -120 775 Z" fill="#fff"/>
